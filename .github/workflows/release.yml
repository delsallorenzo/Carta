name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app and DMG
        run: ./Scripts/package_macos.sh

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Carta.dmg
