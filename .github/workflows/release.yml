name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build app and DMG
        run: ./Scripts/package_macos.sh

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Carta.dmg
